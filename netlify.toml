# Netlify build & deploy config for the Leapfrog Analytics Dashboard.
# Pure client-side Vite + React SPA — no backend, no functions, no env vars.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"

# React Router: every unknown path must serve the SPA shell so the client
# router can resolve it. 200 (not 301) keeps the requested URL in the bar.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache the hashed Vite build assets (filenames already include a hash).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# The HTML shell should always revalidate so new deploys are picked up.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
